<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green-Nova — Añadir Producto</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" href="../css/styles.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Arima+Madurai:wght@800&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;700&display=swap" />
</head>
<body>

    

    <section class="registro-hero">
             <div id="alertas"></div> <!-- Aquí se mostrarán las alertas de Bootstrap -->

        <div class="figma-container shadow-lg">
            <h2 class="text-center mb-4 text-uppercase">Añadir un Nuevo Producto</h2>
            
            <div class="figma-inner-card shadow-sm">
                <form id="formRegistroProducto" class="needs-validation" novalidate>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="idProducto" class="form-label">Id Producto *</label>
                            <input type="text" class="form-control" id="idProducto" required placeholder="Ej. GN-1001">
                            <div class="invalid-feedback">Por favor, ingresa o verifica el ID del producto.</div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="nombreProducto" class="form-label">Nombre del Producto *</label>
                            <input type="text" class="form-control" id="nombreProducto" required placeholder="Ej. Maceta Biodegradable">
                            <div class="invalid-feedback">Por favor, ingresa el nombre del producto.</div>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="tipoProducto" class="form-label">Tipo de Producto *</label>
                            <select class="form-select" id="tipoProducto" required>
                                <option value="" selected disabled>Seleccione...</option>
                                <option value="Interior">Interior</option>
                                <option value="Exterior">Exterior</option>
                                <option value="Macetas">Macetas</option>
                                <option value="Accesorio">Accesorio</option>
                                <option value="suculentas">suculentas</option>
                                <option value="catus">catus</option>
                            </select>
                            <div class="invalid-feedback">Selecciona una categoría válida.</div>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="precioProducto" class="form-label">Precio (MXN) *</label>
                            <input type="number" step="0.01" min="0.01" class="form-control" id="precioProducto" required placeholder="$0.00">
                            <div class="invalid-feedback">Ingresa un precio válido.</div>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="imagenProducto" class="form-label">Agregar Imagen *</label>
                        <input class="form-control" type="file" id="imagenProducto" accept="image/*" required>
                        <div class="invalid-feedback">Por favor, selecciona una imagen para el producto.</div>
                    </div>

                    <h5 class="mt-4 mb-3 fw-bold text-secondary" style="font-size: 0.95rem; font-family: var(--font-inter);">Detalles del Cuidado y Descripción</h5>
                    
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="luzProducto" class="form-label">Requerimiento de Luz</label>
                            <input type="text" class="form-control" id="luzProducto" placeholder="Ej. Sol directo, Sombra">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="riegoProducto" class="form-label">Frecuencia de Riego</label>
                            <input type="text" class="form-control" id="riegoProducto" placeholder="Ej. 2 veces por semana">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="funcionProducto" class="form-label">Función / Beneficio</label>
                        <input type="text" class="form-control" id="funcionProducto" placeholder="Ej. Purifica el aire, Decoración de interiores">
                    </div>

                    <div class="mb-4">
                        <label for="descripcionCorta" class="form-label">Descripción Corta</label>
                        <textarea class="form-control" id="descripcionCorta" rows="3" placeholder="Breve reseña introductoria del producto..."></textarea>
                    </div>

                    <div class="pt-2">                        
                        <button type="button" class="btn btn-success" onclick="guardarProducto()">Guardar producto</button> <!-- Botón para guardar -->                    
                    </div>

                </form>
            </div>
        </div>
    </section>
    <pre id="resultadoJSON" class="bg-light p-3"></pre>
    <script src="registroProducto.js"></script>
</body>
</html>
