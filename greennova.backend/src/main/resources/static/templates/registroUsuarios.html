<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green-Nova — Añadir Producto</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" href="../css/styles.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Arima+Madurai:wght@800&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;700&display=swap" />
</head>
<body>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="../scripts/elements.js"></script>
    <section class="registro-hero">
        <div class="figma-container shadow-lg">
            <h2 class="text-center mb-4 text-uppercase">CREAR USUARIO</h2>
            
            <div class="figma-inner-card shadow-sm">
            <form class="form-box"> <!-- Crea el formulario blanco interno -->
                <div class="mb-3"> <!-- Separa el campo con margen inferior -->
                    <label for="nombre" class="form-label">Nombre Completo *</label> <!-- Etiqueta del campo nombre -->
                    <input type="text" class="form-control" id="nombre" placeholder="Ej. Luis Hernández" required> <!-- Campo para escribir nombre completo -->
                </div> <!-- Cierra el grupo del nombre -->

                <div class="mb-3"> <!-- Separa el campo con margen inferior -->
                    <label for="telefono" class="form-label">Número de Teléfono *</label> <!-- Etiqueta del campo teléfono -->
                    <input type="tel" class="form-control" id="telefono" placeholder="Ej. 5512345678" required> <!-- Campo para escribir teléfono -->
                </div> <!-- Cierra el grupo del teléfono -->

                <div class="mb-3"> <!-- Separa el campo con margen inferior -->
                    <label for="email" class="form-label">Email / Nombre de Usuario *</label> <!-- Etiqueta del campo email -->
                    <input type="email" class="form-control" id="email" placeholder="Ej. usuario@email.com" required> <!-- Campo para escribir correo electrónico -->
                </div> <!-- Cierra el grupo del email -->

                <div class="mb-4"> <!-- Separa el campo con margen inferior más grande -->
                    <label for="password" class="form-label">Contraseña *</label> <!-- Etiqueta del campo contraseña -->
                    <input type="password" class="form-control" id="password" placeholder="Crea una contraseña segura" required> <!-- Campo para escribir contraseña -->
                </div> <!-- Cierra el grupo de contraseña -->

                <button type="submit" class="btn-submit">Registrarse</button> <!-- Botón para enviar el formulario -->
            </form> <!-- Cierra el formulario -->
            </div>
        </div>
    </section>
    <script src="../scripts/registroUsuarios.js"></script>
</body>
</html>
