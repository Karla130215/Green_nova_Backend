<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" href="../css/styles.css" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Arima+Madurai:wght@800&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Mulish:wght@400;700&display=swap" />
</head>

<body>
    
    <section class="ingreso">
        <div class="figma-container shadow-lg">
            <h2 class="text-center mb-4 text-uppercase">Inicio de Sesión</h2>

            <div class="figma-inner-card shadow-sm">
                <form class="form-box" id="login-form">
                    
                    <div class="mb-3">
                        <label for="login-email" class="form-label">Correo Electrónico *</label>
                        <input type="email" class="form-control" id="login-email" placeholder="Ej. jesus@email.com" required>
                    </div>
                    
                    <div class="mb-3"> 
                        <label for="login-password" class="form-label">Contraseña *</label>
                        <input type="password" class="form-control" id="login-password" placeholder="Contraseña" required> 
                    </div> 

                    <button type="submit" class="btn-submit">Ingresar</button>
                </form>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    
    <script src="../scripts/elements.js"></script>
    
    <script src="../scripts/ingresarUsuario.js"></script>
</body>
</html>
